<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포트폴리오 상세</title>
    <style>
      :root {
        --bg: #f6f1e8;
        --surface: #fffdf8;
        --surface-strong: #f8f3eb;
        --line: #e8dfd2;
        --text: #201a15;
        --muted: #7b6f64;
        --accent: #a67c52;
        --shadow: 0 22px 60px rgba(113, 92, 70, 0.12);
        --radius-xl: 34px;
        --radius-lg: 24px;
        --radius-md: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(214, 190, 158, 0.24), transparent 28%),
          linear-gradient(180deg, #f8f3eb 0%, #f6f1e8 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      img {
        display: block;
        width: 100%;
      }

      .shell {
        width: min(1240px, calc(100% - 40px));
        margin: 0 auto;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(14px);
        background: rgba(248, 243, 235, 0.84);
        border-bottom: 1px solid rgba(232, 223, 210, 0.8);
      }

      .topbar__inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        min-height: 76px;
      }

      .brand {
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .topbar__links {
        display: flex;
        align-items: center;
        gap: 14px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
      }

      .topbar__links a {
        padding: 10px 14px;
        border: 1px solid transparent;
        border-radius: 999px;
        transition: 0.2s ease;
      }

      .topbar__links a:hover {
        color: var(--text);
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.76);
      }

      main {
        padding: 42px 0 96px;
      }

      .hero {
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid rgba(232, 223, 210, 0.92);
        border-radius: calc(var(--radius-xl) + 6px);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero__grid {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
        min-height: 650px;
      }

      .hero__visual {
        position: relative;
        min-height: 650px;
        background-position: center;
        background-size: cover;
      }

      .hero__visual::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(20, 17, 14, 0.08), rgba(20, 17, 14, 0.3));
      }

      .hero__badge {
        position: absolute;
        left: 28px;
        top: 28px;
        z-index: 1;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .hero__copy {
        padding: 42px 42px 40px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .hero__title {
        margin: 0;
        font-size: clamp(38px, 4vw, 62px);
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .hero__subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.8;
        word-break: keep-all;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .stat {
        padding: 20px 20px 18px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .stat__label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .stat__value {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .meta__item {
        padding: 18px 18px 16px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.66);
      }

      .meta__label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .meta__value {
        font-size: 17px;
        font-weight: 700;
        line-height: 1.55;
        word-break: keep-all;
      }

      .section {
        margin-top: 34px;
        padding: 38px;
        border-radius: var(--radius-xl);
        border: 1px solid rgba(232, 223, 210, 0.92);
        background: rgba(255, 253, 248, 0.92);
        box-shadow: var(--shadow);
      }

      .section__head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      .section__title {
        margin: 0;
        font-size: clamp(28px, 3vw, 42px);
        line-height: 1.14;
        letter-spacing: -0.04em;
      }

      .section__desc {
        max-width: 580px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.8;
        word-break: keep-all;
      }

      .point-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .point-card {
        padding: 24px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .point-card__num {
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        margin-bottom: 14px;
      }

      .point-card__text {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.7;
        word-break: keep-all;
      }

      .gallery {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 18px;
      }

      .gallery__lead,
      .gallery__stack img,
      .gallery__lead img {
        border-radius: calc(var(--radius-lg) + 4px);
      }

      .gallery__lead {
        overflow: hidden;
        border: 1px solid var(--line);
      }

      .gallery__lead img {
        aspect-ratio: 4 / 3;
        object-fit: cover;
      }

      .gallery__stack {
        display: grid;
        gap: 18px;
      }

      .gallery__stack img {
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border: 1px solid var(--line);
      }

      .story {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
        gap: 24px;
      }

      .story__panel {
        padding: 28px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .story__panel h3 {
        margin: 0 0 16px;
        font-size: 22px;
        letter-spacing: -0.03em;
      }

      .story__panel p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.9;
        word-break: keep-all;
      }

      .story__list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      .story__list li {
        padding: 18px 18px 17px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(248, 243, 235, 0.88);
        font-size: 16px;
        font-weight: 700;
        line-height: 1.7;
        word-break: keep-all;
      }

      .cta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .cta__copy h2 {
        margin: 0 0 12px;
        font-size: clamp(30px, 3vw, 44px);
        line-height: 1.15;
        letter-spacing: -0.04em;
      }

      .cta__copy p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.8;
      }

      .cta__actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 58px;
        padding: 0 28px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 16px;
        font-weight: 800;
        transition: 0.2s ease;
      }

      .button--primary {
        background: #201a15;
        color: #fff;
      }

      .button--primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 16px 30px rgba(32, 26, 21, 0.18);
      }

      .button--ghost {
        background: rgba(255, 255, 255, 0.8);
        border-color: var(--line);
        color: var(--text);
      }

      .button--ghost:hover {
        background: #fff;
      }

      .empty {
        padding: 100px 24px;
        text-align: center;
      }

      .empty h1 {
        margin: 0 0 16px;
        font-size: clamp(34px, 5vw, 56px);
        letter-spacing: -0.04em;
      }

      .empty p {
        margin: 0 auto 24px;
        max-width: 620px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.8;
      }

      @media (max-width: 1080px) {
        .hero__grid,
        .gallery,
        .story,
        .point-grid,
        .cta {
          grid-template-columns: 1fr;
        }

        .hero__visual {
          min-height: 440px;
        }
      }

      @media (max-width: 760px) {
        .shell {
          width: min(100% - 24px, 1240px);
        }

        .topbar__inner {
          min-height: 70px;
          flex-wrap: wrap;
          justify-content: center;
          padding: 14px 0;
        }

        .topbar__links {
          width: 100%;
          justify-content: center;
          flex-wrap: wrap;
        }

        main {
          padding-top: 24px;
        }

        .hero__copy,
        .section {
          padding: 24px;
        }

        .stats,
        .meta {
          grid-template-columns: 1fr;
        }

        .hero__title {
          font-size: 38px;
        }

        .cta__actions {
          width: 100%;
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>

            "조용한 분위기를 해치지 않으면서도 브랜드 이미지는 분명하게 보이도록 정리했습니다."

            <h1>포트폴리오를 찾을 수 없습니다</h1>
            <p>선택한 프로젝트 정보가 아직 준비되지 않았습니다. 주거공간 또는 상업공간 목록으로 돌아가 다른 사례를 확인해 주세요.</p>
            <a class="button button--primary" href="./index.html#cases">포트폴리오 목록으로 돌아가기</a>
          </section>
        `;
      }

      function renderPortfolio(app, item) {
        document.title = `${item.title} | 포트폴리오`;

        app.innerHTML = `
          <section class="hero">
            <div class="hero__grid">
              <div class="hero__visual" style="background-image:url('${item.hero}')">
                <div class="hero__badge">${item.category}</div>
              </div>
              <div class="hero__copy">
                <div>
                  <div class="eyebrow">${item.label}</div>
                  <h1 class="hero__title">${item.title}</h1>
                </div>
                <p class="hero__subtitle">${item.subtitle}</p>
                <div class="stats">
                  <div class="stat">
                    <div class="stat__label">공간 규모</div>
                    <div class="stat__value">${item.area}</div>
                  </div>
                  <div class="stat">
                    <div class="stat__label">공사 기간</div>
                    <div class="stat__value">${item.duration}</div>
                  </div>
                </div>
                <div class="meta">
                  <div class="meta__item">
                    <div class="meta__label">공사 범위</div>
                    <div class="meta__value">${item.scope}</div>
                  </div>
                  <div class="meta__item">
                    <div class="meta__label">비용</div>
                    <div class="meta__value">${item.cost}</div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section__head">
              <div>
                <div class="eyebrow">PROJECT STORY</div>
                <h2 class="section__title">이 프로젝트를 이렇게 정리했습니다</h2>
              </div>
              <div class="section__desc">${item.description}</div>
            </div>
            <div class="point-grid">
              ${item.points
                .map(
                  (point, index) => `
                    <article class="point-card">
                      <div class="point-card__num">POINT 0${index + 1}</div>
                      <p class="point-card__text">${point}</p>
                    </article>
                  `
                )
                .join("")}
            </div>
          </section>

          <section class="section">
            <div class="section__head">
              <div>
                <div class="eyebrow">DETAIL IMAGE</div>
                <h2 class="section__title">상세 이미지를 함께 확인해보세요</h2>
              </div>
              <div class="section__desc">메인 이미지만 보는 것보다 실제 시공 톤과 디테일이 더 잘 읽히도록 대표 장면과 보조 이미지를 함께 구성했습니다.</div>
            </div>
            <div class="gallery">
              <div class="gallery__lead">
                <img src="${item.gallery[0]}" alt="${item.title} 대표 이미지" />
              </div>
              <div class="gallery__stack">
                <img src="${item.gallery[1]}" alt="${item.title} 상세 이미지 1" />
                <img src="${item.gallery[2]}" alt="${item.title} 상세 이미지 2" />
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section__head">
              <div>
                <div class="eyebrow">CONSULTING FLOW</div>
                <h2 class="section__title">상담과 시공은 이런 흐름으로 이어집니다</h2>
              </div>
            </div>
            <div class="story">
              <div class="story__panel">
                <h3>상담 기준</h3>
                <p>공간의 상태와 예산, 일정, 원하는 분위기를 먼저 정리한 뒤 현장 실측과 원가 견적 기준으로 실제 가능한 범위를 제안합니다. 무리한 연출보다 운영과 생활에 맞는 방향을 우선으로 잡는 방식입니다.</p>
              </div>
              <div class="story__panel">
                <h3>체크 포인트</h3>
                <ul class="story__list">
                  <li>실측 후 공정상 꼭 필요한 항목과 제외 가능한 항목을 함께 구분합니다.</li>
                  <li>인건비와 자재비 기준을 먼저 확인한 뒤 디자인과 견적을 조정합니다.</li>
                  <li>직접 시공 또는 검증된 파트너 연결 구조에 맞춰 일정을 안내합니다.</li>

          <section class="section">
            <div class="cta">
              <div class="cta__copy">
                <div class="eyebrow">NEXT STEP</div>
                <h2>비슷한 방향의 공간을 상담으로 이어보세요</h2>
                <p>주거 리모델링부터 상업 공간, 부분 시공까지 현재 상황과 예산에 맞는 방식으로 연결해드립니다.</p>
              </div>
              <div class="cta__actions">
                <a class="button button--primary" href="./index.html#contact">상담 신청하기</a>
                <a class="button button--ghost" href="./index.html#cases">목록으로 돌아가기</a>
              </div>
            </div>
          </section>
        `;
      }

      const app = document.getElementById("app");
      const slug = new URLSearchParams(window.location.search).get("slug");
      const item = slug ? portfolioMap[slug] : null;

      if (!item) {
        renderEmptyState(app);
      } else {
        renderPortfolio(app, item);
      }
